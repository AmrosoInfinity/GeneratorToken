name: Telegram Bot

on:
  schedule:
    - cron: "0 */6 * * *"   # otomatis jalan tiap 6 jam
  workflow_dispatch:        # bisa dipicu manual dari GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Telegram Bot (5 menit)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: timeout 300 python bot.py   # stop setelah 300 detik (5 menit)

      - name: Upload tmp data
        if: always()   # pastikan tetap jalan meskipun step sebelumnya timeout/error
        uses: actions/upload-artifact@v4
        with:
          name: tmp-data
          path: tmp/
