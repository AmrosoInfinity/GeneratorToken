name: Telegram Bot

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare config folder
        run: |
          mkdir -p config
          ls -l config/

      - name: Run Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FRONTEND_TOKEN: ${{ secrets.FRONTEND_TOKEN }}
          BOT_OWNER_ID: ${{ secrets.BOT_OWNER_ID }}
        run: |
          python bot.py &
          BOT_PID=$!
          # 21420 detik = 5 jam 57 menit (sesuai cron tiap 6 jam)
          sleep 21420
          kill $BOT_PID

      - name: Commit tmp folder to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tmp/
          git commit -m "Update tmp data from workflow run" || echo "No changes to commit"
          git pull --rebase origin main
          git push

      - name: Commit data folder to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Update blocked/suspect users data" || echo "No changes to commit"
          git pull --rebase origin main
          git push

      - name: Commit config folder to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add config/
          git commit -m "Update config data (njwt/private key)" || echo "No changes to commit"
          git pull --rebase origin main
          git push
