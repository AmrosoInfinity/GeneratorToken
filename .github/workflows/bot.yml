name: Telegram Bot

on:
  schedule:
    - cron: "0 */6 * * *"   # otomatis jalan tiap 6 jam
  workflow_dispatch:        # bisa dipicu manual dari GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # Unduh artifact dari run sebelumnya
      - name: Download tmp artifact
        uses: actions/download-artifact@v4
        with:
          name: tmp-data
          path: tmp

      # Fallback kalau artifact belum ada (run pertama)
      - name: Buat folder tmp jika kosong
        run: mkdir -p tmp

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Telegram Bot (aktif nonstop)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python bot.py   # script ini sendiri loop polling Telegram

      # Upload artifact baru di akhir job
      - name: Upload tmp artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmp-data
          path: tmp/
