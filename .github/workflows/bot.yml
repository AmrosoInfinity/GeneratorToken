name: Telegram Bot

on:
  schedule:
    - cron: "0 */6 * * *"   # otomatis jalan tiap 6 jam
  workflow_dispatch:        # bisa dipicu manual dari GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # Unduh artifact dari run sebelumnya (jika ada)
      - name: Download tmp artifact
        uses: actions/download-artifact@v4
        with:
          name: tmp-data
          path: tmp
        continue-on-error: true   # jangan gagal kalau artifact belum ada

      # Fallback kalau artifact belum ada (run pertama)
      - name: Buat folder tmp jika kosong
        run: mkdir -p tmp

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Telegram Bot (5 jam 50 menit)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Jalankan bot di background
          python bot.py &
          BOT_PID=$!
          # Biarkan hidup 5 jam 57 menit (21420 detik)
          sleep 21420
          # Stop bot sebelum limit 6 jam tercapai
          kill $BOT_PID

      # Upload artifact baru di akhir job
      - name: Upload tmp artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmp-data
          path: tmp/
