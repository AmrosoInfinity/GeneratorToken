name: Telegram Bot Short Run

on:
  workflow_dispatch:   # bisa dipicu manual dari GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Telegram Bot (3 menit)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Jalankan bot di background
          python bot.py &
          BOT_PID=$!
          # Biarkan hidup 180 detik (3 menit)
          sleep 180
          # Stop bot setelah 3 menit
          kill $BOT_PID

      - name: Upload tmp data artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmp-data
          path: tmp/
