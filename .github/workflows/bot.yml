name: Telegram Bot

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure config exists without overwriting
        run: |
          mkdir -p config data tmp
          # HANYA buat file default jika filenya BELUM ADA di repo
          if [ ! -f config/njwt_config.json ]; then
            echo '{"njwt":"default_njwt"}' > config/njwt_config.json
          fi

      - name: Run Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FRONTEND_TOKEN: ${{ secrets.FRONTEND_TOKEN }}
          BOT_OWNER_ID: ${{ secrets.BOT_OWNER_ID }}
        run: |
          # Timeout 21000 detik (5 jam 50 menit)
          timeout 21000s python bot.py || echo "Bot session ended"

      - name: Commit and Push Changes
        if: always() # Penting: Tetap simpan token baru meski bot timeout
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Ambil perubahan terbaru dari repo (jika ada)
          git pull --rebase origin main
          
          # Tambahkan semua folder yang mungkin berubah
          git add config/ data/ tmp/
          
          # Commit & Push sekaligus
          if git commit -m "Update bot data: njwt, suspects, and logs"; then
            git push origin main
          else
            echo "No changes to commit"
          fi
