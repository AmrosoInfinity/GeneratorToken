name: Telegram Bot

on:
  schedule:
    - cron: "0 */6 * * *"   # otomatis jalan tiap 6 jam
  workflow_dispatch:        # bisa dipicu manual dari GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Restore tmp cache
        uses: actions/cache@v3
        with:
          path: tmp
          key: tmp-${{ runner.os }}
          restore-keys: |
            tmp-${{ runner.os }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python bot.py

      - name: Save tmp cache
        uses: actions/cache@v3
        with:
          path: tmp
          key: tmp-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            tmp-${{ runner.os }}

      - name: Upload tmp data artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmp-data
          path: tmp/
